---
AWSTemplateFormatVersion: '2010-09-09'
Description: KMS key for CloudWatch Logs encryption

Parameters:
  SystemName:
    Type: String
    Default: gha
    Description: System name for resource naming
    AllowedPattern: '[a-z0-9-]+'
  EnvType:
    Type: String
    Default: dev
    Description: Environment type for resource naming
    AllowedPattern: '[a-z0-9-]+'
  CreateKmsKey:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether to create the KMS key
  KmsKeyDeletionWindowInDays:
    Type: Number
    Default: 30
    MinValue: 7
    MaxValue: 30
    Description: Number of days before the KMS key is deleted after destruction
  KmsKeyRotationPeriodInDays:
    Type: Number
    Default: 365
    MinValue: 90
    MaxValue: 2560
    Description: Number of days between automatic key rotations

Conditions:
  ShouldCreateKmsKey: !Equals
    - !Ref CreateKmsKey
    - 'true'

Resources:
  KmsKey:
    Type: AWS::KMS::Key
    Condition: ShouldCreateKmsKey
    Properties:
      Description: !Sub '${SystemName}-${EnvType} KMS key'
      EnableKeyRotation: true
      RotationPeriodInDays: !Ref KmsKeyRotationPeriodInDays
      PendingWindowInDays: !Ref KmsKeyDeletionWindowInDays
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: AllowCloudWatchLogsEncryption
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.amazonaws.com'
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: '*'
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub >-
                  arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*
      Tags:
        - Key: Name
          Value: !Sub '${SystemName}-${EnvType}-kms-key'
        - Key: SystemName
          Value: !Ref SystemName
        - Key: EnvType
          Value: !Ref EnvType

  KmsKeyAlias:
    Type: AWS::KMS::Alias
    Condition: ShouldCreateKmsKey
    Properties:
      AliasName: !Sub 'alias/${SystemName}-${EnvType}-kms-key'
      TargetKeyId: !Ref KmsKey

Outputs:
  KmsKeyArn:
    Condition: ShouldCreateKmsKey
    Description: ARN of the KMS key
    Value: !GetAtt KmsKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KmsKeyArn'
  KmsKeyAliasName:
    Condition: ShouldCreateKmsKey
    Description: Name of the KMS key alias
    Value: !Ref KmsKeyAlias
    Export:
      Name: !Sub '${AWS::StackName}-KmsKeyAliasName'
